<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Demo Bank — protected by Verawall</title>
<style>
  :root {
    --ink: #14202b; --muted: #62727f; --line: #e6ebf0; --bg: #eef1f5;
    --brand: #0a5bd3; --brand-ink: #08419a;   /* Demo Bank navy — deliberately NOT Verawall red */
    --ok: #1e9e5a; --warn: #c67c00; --stop: #d71a28;
    --card: #fff;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); }
  .wrap { max-width: 940px; margin: 0 auto; padding: 24px 16px 60px; }
  .app { display: grid; grid-template-columns: minmax(0,1fr) 300px; gap: 20px; align-items: start; }
  @media (max-width: 760px) { .app { grid-template-columns: 1fr; } }

  .topbar { display: flex; align-items: center; gap: 10px; padding: 4px 2px 18px; }
  .logo { width: 30px; height: 30px; border-radius: 8px; background: var(--brand); color: #fff; display: grid; place-items: center; font-weight: 800; }
  .brand { font-weight: 800; font-size: 17px; letter-spacing: -0.01em; }
  .topbar .who { margin-left: auto; font-size: 13px; color: var(--muted); }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 22px; box-shadow: 0 1px 2px rgba(20,32,43,0.03); }
  h2 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin: 0 0 18px; }
  label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin: 14px 0 5px; letter-spacing: 0.02em; }
  input { width: 100%; font-size: 15px; padding: 11px 12px; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfd; }
  input:focus { outline: 2px solid #cfe0fb; border-color: var(--brand); }
  button { font-family: inherit; cursor: pointer; }
  .btn { width: 100%; margin-top: 18px; padding: 12px; border: none; border-radius: 8px; background: var(--brand); color: #fff; font-weight: 700; font-size: 15px; }
  .btn:hover { background: var(--brand-ink); }
  .btn.ghost { background: #fff; color: var(--brand); border: 1px solid var(--line); }
  .btn:disabled { opacity: 0.55; cursor: default; }

  .balance { font-size: 34px; font-weight: 800; letter-spacing: -0.02em; }
  .balance small { font-size: 14px; font-weight: 600; color: var(--muted); }
  .row { display: flex; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .row:last-child { border-bottom: none; }
  .row .neg { color: var(--ink); font-variant-numeric: tabular-nums; }

  .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .preset { flex: 1; min-width: 150px; text-align: left; padding: 11px 12px; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfd; font-size: 12.5px; color: var(--muted); }
  .preset b { display: block; color: var(--ink); font-size: 13.5px; margin-bottom: 2px; }
  .preset.sel { border-color: var(--brand); background: #f2f7ff; }

  .outcome { text-align: center; padding: 10px 0 4px; }
  .outcome .icon { width: 56px; height: 56px; border-radius: 50%; display: grid; place-items: center; margin: 0 auto 12px; font-size: 26px; color: #fff; }
  .outcome h2 { font-size: 20px; }
  .otp { letter-spacing: 0.4em; text-align: center; font-size: 18px; }

  /* Verawall side panel — the platform's view */
  .vw { position: sticky; top: 20px; }
  .vw .head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .vw .dot { width: 20px; height: 20px; border-radius: 5px; background: var(--stop); color: #fff; display: grid; place-items: center; font-weight: 800; font-size: 12px; }
  .vw .title { font-weight: 800; font-size: 14px; }
  .vw .tag { font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
  .vw .status { font-size: 12.5px; color: var(--muted); margin: 12px 0; line-height: 1.5; }
  .band { display: inline-flex; align-items: center; gap: 8px; font-weight: 800; font-size: 13px; padding: 6px 12px; border-radius: 999px; }
  .score { font-family: ui-monospace, Menlo, monospace; }
  .sig { display: flex; gap: 8px; padding: 8px 0; border-top: 1px solid var(--line); font-size: 12px; align-items: baseline; }
  .sig .w { font-weight: 800; color: var(--stop); min-width: 30px; }
  .sig .lab { color: var(--ink); font-weight: 600; }
  .sig .ev { color: var(--muted); display: block; font-size: 11px; margin-top: 1px; }
  .muted { color: var(--muted); font-size: 12px; }
  .live { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .live::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--ok); }
  code { background: #f1f4f7; border-radius: 4px; padding: 1px 5px; font-size: 11.5px; }

  /* Anti-scam banner — raised locally by the SDK the instant screen-share is
     reported, before any transfer or server call. */
  .scam-banner { display: none; align-items: flex-start; gap: 12px; background: #fff4e5;
    border: 1px solid #f0c37a; border-left: 4px solid var(--warn); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 18px; }
  .scam-banner .sb-icon { font-size: 20px; line-height: 1.1; }
  .scam-banner .sb-head { font-weight: 800; font-size: 14px; color: #8a5200; margin-bottom: 3px; }
  .scam-banner .sb-sub { font-size: 12.5px; color: #6b4c15; line-height: 1.5; }

  .demo-ctl { margin-top: 16px; padding-top: 12px; border-top: 1px dashed var(--line); }
  .demo-ctl label { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600;
    color: var(--muted); text-transform: none; letter-spacing: 0; margin: 0; cursor: pointer; }
  .demo-ctl input { width: auto; }
  .demo-ctl .hint { font-size: 10.5px; color: var(--muted); margin-top: 5px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">DB</div>
    <div class="brand">Demo Bank</div>
    <div class="who" id="who"></div>
  </div>

  <!-- SDK-raised anti-scam banner (local, no server round-trip) -->
  <div class="scam-banner" id="scamBanner"></div>

  <div class="app">
    <!-- LEFT: the banking app -->
    <div id="screen"></div>

    <!-- RIGHT: Verawall's live view -->
    <aside class="vw card">
      <div class="head">
        <div class="dot">V</div>
        <div>
          <div class="title">Verawall</div>
          <div class="tag">Behavioral intelligence</div>
        </div>
      </div>
      <div id="vwbody">
        <div class="status">Waiting for a session…</div>
      </div>
      <div class="demo-ctl">
        <label><input type="checkbox" id="simShare" /> Simulate screen-share</label>
        <div class="hint">A native/webview shell reports this via <code>FraudSdk.reportRemoteAccess()</code>. A browser page can't detect AnyDesk on its own.</div>
      </div>
    </aside>
  </div>
</div>

<script type="module">
import { FraudSdk, BusinessEvent } from '../dist/index.js';

const $ = (id) => document.getElementById(id);
const fmt = (n) => n.toLocaleString('en-US');
let cfg = { collectorUrl: 'http://localhost:8080', tenantId: 'wallet-acme', siteKey: 'site_wallet-acme_pub', demoEmail: 'olivia@demobank.cz' };
let state = { email: '', balance: 184320, screen: 'login' };

const bandColor = { ALLOW: '#1e9e5a', STEP_UP: '#c67c00', HOLD: '#d71a28' };
const bandBg = { ALLOW: '#eaf7f0', STEP_UP: '#fbf1e2', HOLD: '#fbeaec' };

// ---------- Verawall side panel ----------
function vwWaiting() {
  $('vwbody').innerHTML = `<div class="status">Waiting for a session…</div>`;
}
function vwCapturing() {
  $('vwbody').innerHTML = `
    <div class="status">Session bound. Every keystroke rhythm, session event and device signal is captured and posted to the collector — <b>timing only, never keystroke content</b>.</div>
    <div class="live">SDK capturing behavior</div>`;
}
function vwDecision(d) {
  const band = d.decision;
  const sigs = (d.signals || []).map((s) => `
    <div class="sig"><span class="w">+${s.weight}</span><span><span class="lab">${s.label}</span><span class="ev">${s.evidence || ''}</span></span></div>`).join('');
  $('vwbody').innerHTML = `
    <div class="status" style="margin-bottom:12px">The bank's backend called <code>/v1/score</code> with the session token. Verdict:</div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span class="band" style="color:${bandColor[band]};background:${bandBg[band]}">${band.replace('_',' ')}</span>
      <span class="score" style="font-weight:800;font-size:20px;color:${bandColor[band]}">${d.riskScore}</span>
    </div>
    ${d.threatType ? `<div class="muted" style="margin-top:8px">Classification: <b>${d.threatType}</b>${d.alertId ? ` · alert ${d.alertId}` : ''}</div>` : ''}
    <div style="margin-top:14px" class="tag">Signals that fired</div>
    ${sigs || '<div class="muted" style="padding-top:8px">No risk signals.</div>'}`;
}

// ---------- anti-scam banner (driven by the SDK's local risk hook) ----------
function renderBanner(risk) {
  const el = $('scamBanner');
  if (!risk || !risk.reasons.includes('SCREEN_SHARE')) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = `
    <div class="sb-icon">🛡️</div>
    <div>
      <div class="sb-head">Screen sharing detected on this device</div>
      <div class="sb-sub">If someone phoned you and asked to install an app like <b>AnyDesk</b> or <b>TeamViewer</b>, or is watching your screen right now — <b>hang up</b>. Demo Bank will never ask you to share your screen or move money to a “safe account”.</div>
    </div>`;
}

// ---------- screens ----------
function render() {
  $('who').textContent = state.screen === 'login' ? '' : state.email;
  if (state.screen === 'login') return renderLogin();
  if (state.screen === 'dashboard') return renderDashboard();
  if (state.screen === 'transfer') return renderTransfer();
}

function renderLogin() {
  vwWaiting();
  $('screen').innerHTML = `
    <div class="card">
      <h2>Sign in</h2>
      <p class="sub">Demo customer — credentials are pre-filled.</p>
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" value="${cfg.demoEmail}" />
      <label for="pin">PIN</label>
      <input id="pin" type="password" autocomplete="current-password" placeholder="••••••" value="481920" />
      <button class="btn" id="signin">Sign in</button>
    </div>`;
  FraudSdk.captureKeystrokes($('email'), 'login.email');
  FraudSdk.captureKeystrokes($('pin'), 'login.pin');
  $('signin').onclick = login;
}

async function login() {
  state.email = $('email').value.trim() || cfg.demoEmail;
  FraudSdk.session().setUser(await FraudSdk.hash(state.email));
  FraudSdk.session().event(BusinessEvent.loginResult('SUCCESS'));
  FraudSdk.session().screenView('dashboard');
  vwCapturing();
  state.screen = 'dashboard';
  render();
}

function renderDashboard() {
  const activity = [
    ['Employer s.r.o. — salary', '+62,000'],
    ['ČEZ — utilities', '−1,240'],
    ['Rohlík.cz — groceries', '−2,180'],
  ];
  $('screen').innerHTML = `
    <div class="card">
      <p class="sub" style="margin:0">Current account · CZ89 •• 4412</p>
      <div class="balance">${fmt(state.balance)} <small>CZK</small></div>
      <button class="btn" id="new">New transfer</button>
    </div>
    <div class="card" style="margin-top:16px">
      <h2 style="font-size:15px">Recent activity</h2>
      ${activity.map(([n, a]) => `<div class="row"><span>${n}</span><span class="neg">${a}</span></div>`).join('')}
    </div>`;
  $('new').onclick = () => { FraudSdk.session().screenView('transfer'); state.screen = 'transfer'; render(); };
}

const PRESETS = [
  { id: 'rent', title: 'Pay landlord', sub: '8,000 CZK · known payee', payee: 'CZ22 •• 7781', amount: 8000, newPayee: false },
  { id: 'attack', title: 'New payee — large', sub: '150,000 CZK · first-time payee', payee: 'CZ55 •• 0930', amount: 150000, newPayee: true },
  { id: 'coached', title: 'Coached transfer', sub: '90,000 CZK · payee added just now', payee: 'CZ71 •• 3300', amount: 90000, newPayee: true, rushed: true },
];
let pick = 'rent';

function renderTransfer() {
  vwCapturing();
  const p = PRESETS.find((x) => x.id === pick);
  $('screen').innerHTML = `
    <div class="card">
      <h2>Send money</h2>
      <p class="sub">Pick a scenario, or edit the amount — Verawall scores the session in real time.</p>
      <div class="presets">
        ${PRESETS.map((x) => `<button class="preset ${x.id === pick ? 'sel' : ''}" data-p="${x.id}"><b>${x.title}</b>${x.sub}</button>`).join('')}
      </div>
      <label for="payee">Payee (IBAN)</label>
      <input id="payee" value="${p.payee}" />
      <label for="amount">Amount (CZK)</label>
      <input id="amount" type="number" value="${p.amount}" />
      <button class="btn" id="send">Send transfer</button>
      <button class="btn ghost" id="back" style="margin-top:8px">Cancel</button>
    </div>`;
  document.querySelectorAll('[data-p]').forEach((b) => b.onclick = () => { pick = b.dataset.p; renderTransfer(); });
  $('back').onclick = () => { state.screen = 'dashboard'; render(); };
  $('send').onclick = () => sendTransfer(p);
}

async function sendTransfer(preset) {
  const amount = Number($('amount').value) || preset.amount;
  const newPayee = preset.newPayee;
  $('send').disabled = true; $('send').textContent = 'Checking…';

  // A "coached" transfer creates the payee live, then pays it straight away —
  // the APP-scam tell. A plain new-payee transfer skips this (payee added earlier).
  if (preset.rushed) FraudSdk.session().event(BusinessEvent.payeeAdded('demo-payee-' + Date.now(), 'BANK'));
  FraudSdk.session().event(BusinessEvent.txnInitiated({
    amountBucket: amount >= 50000 ? 'HIGH' : 'MID', currency: 'CZK', payeeIsNew: newPayee, channel: 'BANK_TRANSFER',
  }));
  await FraudSdk.flush();
  const token = await FraudSdk.session().getToken();

  const decision = await fetch('/demo/pay', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, amount, payeeNew: newPayee }),
  }).then((r) => r.json());

  vwDecision(decision);
  showOutcome(decision, amount);
}

function showOutcome(d, amount) {
  const band = d.decision;
  if (band === 'ALLOW') {
    state.balance -= amount;
    outcomeCard('✓', 'var(--ok)', 'Payment sent', `${fmt(amount)} CZK is on its way. No extra checks needed.`);
  } else if (band === 'STEP_UP') {
    outcomeStepUp(amount);
  } else {
    outcomeCard('!', 'var(--stop)', 'Payment held for review',
      'This transfer was paused for a security review. Our fraud team will be in touch — no money has left your account.');
  }
}

function outcomeCard(icon, color, title, msg, extra = '') {
  $('screen').innerHTML = `
    <div class="card outcome">
      <div class="icon" style="background:${color}">${icon}</div>
      <h2>${title}</h2>
      <p class="sub" style="max-width:340px;margin:6px auto 0">${msg}</p>
      ${extra}
      <button class="btn ghost" id="done" style="max-width:220px;margin:22px auto 0">Back to account</button>
    </div>`;
  $('done').onclick = () => { state.screen = 'dashboard'; render(); };
}

function outcomeStepUp(amount) {
  outcomeCard('↑', 'var(--warn)', 'Extra verification needed',
    'This transfer looks unusual, so we need a one-time code before it goes through.',
    `<div style="max-width:220px;margin:16px auto 0"><input id="otp" class="otp" maxlength="6" placeholder="••••••" /><button class="btn" id="verify" style="margin-top:10px">Verify & send</button></div>`);
  $('verify').onclick = () => {
    state.balance -= amount;
    outcomeCard('✓', 'var(--ok)', 'Payment sent', `Verified. ${fmt(amount)} CZK is on its way.`);
  };
}

// ---------- boot ----------
(async () => {
  try { cfg = { ...cfg, ...(await fetch('/demo/config').then((r) => r.json())) }; } catch { /* defaults */ }
  FraudSdk.init({ tenantId: cfg.tenantId, siteKey: cfg.siteKey, collectorUrl: cfg.collectorUrl, flushIntervalMs: 2000 });
  FraudSdk.onLocalRisk(renderBanner);
  $('simShare').onchange = (e) => FraudSdk.reportRemoteAccess(e.target.checked);
  render();
})();
</script>
</body>
</html>
